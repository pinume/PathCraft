name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Run tests with strict warnings
        run: uv run python -W error -m unittest discover -v

      - name: Compile Python sources
        run: uv run python -m compileall -q main.py src/pathcraft tests

      - name: Check installed dependencies
        run: uv pip check

      - name: Install PathCraft command
        run: uv tool install .

      - name: Verify PathCraft command
        run: uv run python -c "import subprocess; result = subprocess.run(['uv', 'tool', 'run', 'pathcraft'], input='q\n', text=True, check=False); raise SystemExit(result.returncode)"

      - name: Build distributions
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv build
