<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PathCraft</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div id="appWindow" class="window-frame">
    <header id="titlebar" class="titlebar">
      <div class="titlebar-drag pywebview-drag-region" aria-hidden="true"></div>
      <div class="titlebar-brand">
        <span class="titlebar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 20 20 4m0 0h-8m8 0v8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span>PathCraft</span>
      </div>
      <div class="titlebar-controls">
        <button id="minimizeWindow" type="button" aria-label="最小化">
          <svg viewBox="0 0 12 12"><path d="M2 6h8"/></svg>
        </button>
        <button id="maximizeWindow" type="button" aria-label="最大化">
          <svg class="maximize-icon" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8"/></svg>
          <svg class="restore-icon" viewBox="0 0 12 12"><path d="M4 3h6v6H9M2 5h6v5H2z"/></svg>
        </button>
        <button id="closeWindow" class="close-window" type="button" aria-label="关闭">
          <svg viewBox="0 0 12 12"><path d="m2 2 8 8m0-8-8 8"/></svg>
        </button>
      </div>
    </header>

  <main class="app-shell">
    <header class="app-header">
      <div class="brand-copy">
        <h1>PathCraft</h1>
        <p>批量文件路径处理工具</p>
      </div>
      <span id="version" class="version">v—</span>
    </header>

    <section class="card settings-card" aria-labelledby="settings-title">
      <h2 id="settings-title" class="sr-only">处理设置</h2>
      <div class="field-row">
        <label for="rootInput">工作目录</label>
        <div class="field-control with-action">
          <input id="rootInput" class="mono" type="text" readonly>
          <button id="rootBrowse" class="inside-button" type="button">选择…</button>
        </div>
      </div>
      <div class="field-row">
        <label for="operationSelect">操作</label>
        <div class="field-control">
          <select id="operationSelect"></select>
        </div>
      </div>
      <div id="operationFields"></div>
    </section>

    <section class="action-panel" aria-label="操作与进度">
    <div class="actions">
      <button id="previewButton" class="button secondary" type="button">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        生成预览
      </button>
      <button id="executeButton" class="button primary" type="button" disabled>
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m5 12 5 5L20 7"/></svg>
        <span id="executeLabel">执行</span>
      </button>
      <span class="action-divider" aria-hidden="true"></span>
      <button id="undoButton" class="button ghost" type="button" disabled>
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5M4 9h10a6 6 0 0 1 0 12h-2"/></svg>
        撤销上次操作
      </button>
      <div id="statusLine" class="status-line" data-tone="amber" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">正在初始化…</span>
      </div>
    </div>
      <div id="progressTrack" class="progress-track" role="progressbar" aria-label="处理进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" hidden>
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </section>

    <section class="card results-card" aria-label="处理结果">
      <div id="resultsToolbar" class="results-toolbar" hidden>
        <label class="result-search" for="resultSearch">
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16 16 5 5"/></svg>
          <input id="resultSearch" type="search" placeholder="搜索文件名或说明" autocomplete="off">
        </label>
        <select id="statusFilter" class="status-filter" aria-label="按状态筛选">
          <option value="all">全部状态</option>
          <option value="ready">待处理</option>
          <option value="done">已处理</option>
          <option value="blocked">已阻止</option>
          <option value="issue">处理详情</option>
          <option value="current">当前文件</option>
        </select>
        <span id="filterCount" class="filter-count"></span>
      </div>
      <div id="tableScroll" class="table-scroll">
        <table id="resultTable" hidden>
          <thead>
            <tr>
              <th class="source-column">源文件</th>
              <th class="destination-column">目标 / 输出</th>
              <th class="status-column">状态</th>
              <th>说明</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg>
          </div>
          <h2>还没有预览结果</h2>
          <p>设置好操作参数后，点击 <button id="emptyPreviewButton" class="inline-action" type="button">生成预览</button> 查看将被处理的文件列表</p>
        </div>
        <div id="filterEmptyState" class="filter-empty-state" hidden>
          <strong>没有匹配的结果</strong>
          <span>尝试更换关键词或状态筛选</span>
        </div>
      </div>
      <footer class="results-footer">
        <span id="footerState">就绪</span>
        <div>
          <span id="fileCount">0 个文件</span>
          <span id="directoryName">目录：—</span>
        </div>
      </footer>
    </section>
    <p class="interaction-note">↑ 点击“生成预览”查看将被处理的文件</p>
  </main>
    <div id="dropOverlay" class="drop-overlay" hidden aria-hidden="true">
      <div class="drop-card">
        <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/><path d="M12 15V9m0 0-2.5 2.5M12 9l2.5 2.5"/></svg>
        <strong>释放以选择工作目录</strong>
        <span>拖入文件时将使用它所在的目录</span>
      </div>
    </div>
  </div>
</body>
</html>
